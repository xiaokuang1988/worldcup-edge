name: Update Ticai snapshot data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build China Sports Lottery snapshot data
        run: node scripts/build-ticai-data.mjs
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/live-matches.json outputs/data/live-matches.json
          git diff --cached --quiet || git commit -m "Update Ticai snapshot data"
          git push

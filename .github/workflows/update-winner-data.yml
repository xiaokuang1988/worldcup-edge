name: Update WINNER data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch official WINNER data
        run: node scripts/update-winner-data.mjs
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/live-matches.json outputs/data/live-matches.json
          git diff --cached --quiet || git commit -m "Update WINNER official data"
          git push
